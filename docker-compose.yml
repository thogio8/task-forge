services:
  app:
    build: .
    container_name: taskforge_app
    env_file: .env
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    container_name: taskforge_db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"
    restart: always

volumes:
  postgres_data:
