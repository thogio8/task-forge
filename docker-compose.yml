services:
  app:
    build: .
    container_name: taskforge_app
    env_file: .env
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    restart: always
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    container_name: taskforge_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d/
    ports:
      - "${DB_PORT}:5432"
    restart: always

volumes:
  postgres_data:
